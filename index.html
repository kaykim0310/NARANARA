<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나라장터 입찰 모니터 v4.6</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; color: #e2e8f0; }
    .header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #334155; padding: 12px 16px; position: sticky; top: 0; z-index: 50; }
    .logo-box { width: 40px; height: 40px; background: linear-gradient(135deg, #06b6d4, #3b82f6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(30, 41, 59, 0.7); border-radius: 16px; border: 1px solid #334155; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
    .card:hover { border-color: rgba(34, 211, 238, 0.5); }
    .card-kepco { border-color: rgba(250, 204, 21, 0.5); background: rgba(250, 204, 21, 0.03); }
    .card-urgent { border-color: rgba(248, 113, 113, 0.5); background: rgba(248, 113, 113, 0.05); }
    .filter-box { background: rgba(30, 41, 59, 0.5); border-radius: 16px; border: 1px solid #334155; padding: 16px; margin-bottom: 24px; }
    .btn { border-radius: 12px; cursor: pointer; transition: all 0.2s; border: none; padding: 8px 16px; }
    .btn-primary { background: linear-gradient(135deg, #06b6d4, #3b82f6); color: #fff; }
    .btn-secondary { background: #334155; color: #cbd5e1; }
    .badge { padding: 4px 8px; border-radius: 8px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; margin-right: 6px; margin-bottom: 6px; }
    .badge-cyan { background: rgba(34, 211, 238, 0.2); color: #22d3ee; }
    .badge-yellow { background: rgba(250, 204, 21, 0.2); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.3); }
    .badge-green { background: rgba(52, 211, 153, 0.2); color: #34d399; }
    .badge-orange { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
    .badge-purple { background: rgba(192, 132, 252, 0.2); color: #c084fc; }
    .badge-red { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    .badge-slate { background: #334155; color: #cbd5e1; }
    .input { background: rgba(15, 23, 42, 0.5); border: 1px solid #475569; border-radius: 12px; color: #fff; outline: none; padding: 8px 12px; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; background: #334155; border: 1px solid #475569; border-radius: 12px; z-index: 200; animation: slideIn 0.3s ease; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-content { background: #1e293b; border-radius: 16px; border: 1px solid #475569; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { background: linear-gradient(135deg, #06b6d4, #3b82f6); padding: 24px; border-radius: 16px 16px 0 0; }
    .modal-header-kepco { background: linear-gradient(135deg, #eab308, #f97316); }
    .toggle { position: relative; width: 48px; height: 24px; background: #475569; border-radius: 12px; cursor: pointer; }
    .toggle.active { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: all 0.3s; }
    .toggle.active::after { left: 26px; }
    .info-box { background: rgba(34, 211, 238, 0.1); border: 1px solid #22d3ee; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .org-link { cursor: pointer; transition: all 0.2s; }
    .org-link:hover { color: #22d3ee !important; text-decoration: underline; }
    .sidebar { background: rgba(30, 41, 59, 0.9); border: 1px solid #334155; border-radius: 16px; }
    @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 1.5s infinite; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // API 설정 (Netlify Functions 사용)
    const API = {
      g2b: '/api/g2b',      // Netlify Function
      award: '/api/award',  // Netlify Function
      kepco: '/api/kepco',  // Netlify Function
    };

    const KEPCO_COMPANIES = {
      'COM01': '한국전력공사', 'COM02': '한국서부발전', 'COM04': '한국남부발전',
      'COM05': '한국중부발전', 'COM06': '한국남동발전', 'COM08': '한국동서발전',
      'COM09': '한국전력기술', 'COM10': '한전KPS',
    };

    const KEYWORDS = [
      { id: 'work-env', label: '작업환경측정', value: '작업환경측정' },
      { id: 'musculo', label: '근골격계', value: '근골격계' },
      { id: 'risk-assess', label: '위험성평가', value: '위험성평가' },
      { id: 'chemical', label: '화학물질', value: '화학물질' },
      { id: 'safety-diag', label: '안전보건진단', value: '안전보건진단' },
      { id: 'health-mgmt', label: '보건관리', value: '보건관리' },
      { id: 'safety-edu', label: '안전보건교육', value: '안전보건교육' },
      { id: 'safety-system', label: '안전보건관리체계', value: '안전보건관리체계' },
      { id: 'safety-impl', label: '이행실태', value: '이행실태' },
      { id: 'serious-acc', label: '중대재해', value: '중대재해' },
    ];

    const REGIONS = [
      { code: '', name: '전체 지역' }, { code: '서울', name: '서울' }, { code: '부산', name: '부산' },
      { code: '대구', name: '대구' }, { code: '인천', name: '인천' }, { code: '광주', name: '광주' },
      { code: '대전', name: '대전' }, { code: '울산', name: '울산' }, { code: '경기', name: '경기' },
      { code: '강원', name: '강원' }, { code: '충북', name: '충북' }, { code: '충남', name: '충남' },
      { code: '전북', name: '전북' }, { code: '전남', name: '전남' }, { code: '경북', name: '경북' },
      { code: '경남', name: '경남' }, { code: '제주', name: '제주' },
    ];

    const BSNS_COLORS = { '용역': 'badge-cyan', '물품': 'badge-green', '공사': 'badge-orange', '외자': 'badge-purple' };

    // 유틸리티
    const ymd = d => d.toISOString().slice(0,10).replace(/-/g,'');
    const formatKepcoDate = s => s?.length >= 8 ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : '-';
    const formatAmount = a => {
      if (!a) return '-';
      const n = typeof a === 'string' ? parseInt(a.replace(/,/g, '')) : a;
      return isNaN(n) ? '-' : new Intl.NumberFormat('ko-KR').format(n) + '원';
    };
    const formatAmountShort = a => {
      if (!a) return '-';
      const n = typeof a === 'string' ? parseInt(a.replace(/,/g, '')) : a;
      return isNaN(n) ? '-' : Math.round(n / 10000).toLocaleString() + '만';
    };
    const calcDday = s => {
      if (!s) return null;
      let d = s.length === 14 ? new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8)) : new Date(s);
      return Math.ceil((d - new Date()) / 86400000);
    };

    // 키워드 매칭 함수 (선택된 키워드 Set을 인자로 받음)
    const matchKeyword = (text, selectedKeywords) => {
      if (!text) return null;
      for (const kw of KEYWORDS) {
        if (selectedKeywords.has(kw.id) && text.includes(kw.value)) {
          return kw.value;
        }
      }
      return null;
    };

    // KEPCO 공고명에서 발전본부/발전소명 추출
    const extractPlaceName = (name) => {
      if (!name) return null;
      // "XX발전본부", "XX발전소", "XX지사", "XX지점", "XX사업소" 등 패턴
      const match = name.match(/([가-힣]+발전본부|[가-힣]+발전소|[가-힣]+지사|[가-힣]+지점|[가-힣]+사업소|[가-힣]+센터)/);
      return match ? match[1] : null;
    };

    // 서버 API 호출 (PHP 프록시 사용으로 CORS 문제 없음)
    const fetchApi = async (url) => {
      try {
        const res = await fetch(url);
        if (res.ok) {
          return await res.text();
        }
        console.log('API 호출 실패:', res.status);
        return null;
      } catch (e) {
        console.log('API 호출 에러:', e);
        return null;
      }
    };

    // 하위호환을 위해 fetchWithCorsProxy도 유지
    const fetchWithCorsProxy = fetchApi;

    // 상세 모달
    const DetailModal = ({ item, onClose, onOrgClick }) => {
      if (!item) return null;
      const isK = item.source === 'KEPCO';
      const dday = calcDday(isK ? item.endDatetime : item.bidClseDate);
      const urgent = dday !== null && dday >= 0 && dday <= 5;
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{animation: 'slideIn 0.3s ease'}}>
            <div className={`modal-header ${isK ? 'modal-header-kepco' : ''}`}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{marginBottom:'8px'}}>
                    {item.matchedKeyword && <span className="badge badge-cyan">{item.matchedKeyword}</span>}
                    {isK ? <span className="badge badge-yellow">⚡ KEPCO</span> : (
                      <>
                        <span className={`badge ${BSNS_COLORS[item.bsnsDivNm] || 'badge-slate'}`}>{item.bsnsDivNm}</span>
                        {item.ppsNtceYn === 'N' && <span className="badge badge-purple">🔗 연계</span>}
                      </>
                    )}
                    {urgent && <span className="badge badge-red animate-pulse">🔥 D-{dday}</span>}
                  </div>
                  <h2 style={{fontSize:'20px', fontWeight:'bold', color:'white', marginBottom:'8px'}}>{isK ? item.name : item.bidNtceNm}</h2>
                  <p style={{fontSize:'14px', color:'rgba(255,255,255,0.8)'}}>공고번호: {isK ? item.no : item.bidNtceNo}</p>
                </div>
                <button onClick={onClose} style={{background:'none', border:'none', color:'white', fontSize:'24px', cursor:'pointer', padding:'8px'}}>✕</button>
              </div>
            </div>
            
            <div style={{padding:'24px'}}>
              <div className="card" style={{background: isK ? 'linear-gradient(135deg, rgba(234,179,8,0.1), rgba(249,115,22,0.1))' : 'linear-gradient(135deg, rgba(6,182,212,0.1), rgba(59,130,246,0.1))', marginBottom:'16px'}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', textAlign:'center'}}>
                  <div>
                    <div style={{color:'#94a3b8', fontSize:'14px', marginBottom:'4px'}}>추정가격</div>
                    <div style={{fontSize:'24px', fontWeight:'bold', color:'#34d399'}}>{formatAmount(isK ? item.presumedPrice : item.presmptPrce)}</div>
                  </div>
                  <div>
                    <div style={{color:'#94a3b8', fontSize:'14px', marginBottom:'4px'}}>{isK ? '기초금액' : '배정예산'}</div>
                    <div style={{fontSize:'20px', fontWeight:'bold', color:'white'}}>{formatAmount(isK ? item.estimatedPriceBasicAmount : item.asignBdgtAmt)}</div>
                  </div>
                </div>
              </div>
              
              <div className="card" style={{marginBottom:'16px'}}>
                <h3 style={{fontWeight:'600', color:'white', marginBottom:'12px'}}>🏢 기관 정보</h3>
                {isK ? (
                  <>
                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}>
                      <span style={{color:'#94a3b8'}}>회사</span>
                      <span style={{color:'#facc15', fontWeight:'500'}}>{KEPCO_COMPANIES[item.company] || item.company}</span>
                    </div>
                    <div style={{display:'flex', justifyContent:'space-between'}}>
                      <span style={{color:'#94a3b8'}}>발주처</span>
                      <span 
                        className="org-link"
                        style={{color:'#facc15', fontWeight:'500'}}
                        onClick={(e) => { 
                          e.stopPropagation(); 
                          const placeName = extractPlaceName(item.name) || KEPCO_COMPANIES[item.company] || '한국전력공사';
                          onOrgClick(placeName, e, true); 
                          onClose(); 
                        }}
                      >
                        📊 {extractPlaceName(item.name) || item.placeName || '전체'}
                      </span>
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}>
                      <span style={{color:'#94a3b8'}}>공고기관</span>
                      <span 
                        className="org-link"
                        style={{color:'#22d3ee', fontWeight:'500'}}
                        onClick={(e) => { e.stopPropagation(); onOrgClick(item.ntceInsttNm, e); onClose(); }}
                      >
                        📊 {item.ntceInsttNm}
                      </span>
                    </div>
                    {item.ntceInsttOfclTel && <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'#94a3b8'}}>연락처</span><span style={{color:'#22d3ee'}}>{item.ntceInsttOfclTel}</span></div>}
                  </>
                )}
              </div>
              
              <a 
                href={isK ? "https://srm.kepco.net" : item.bidNtceUrl} 
                target="_blank" 
                rel="noopener noreferrer"
                className="btn btn-primary"
                style={{display:'block', textAlign:'center', padding:'12px', fontWeight:'600', textDecoration:'none', background: isK ? 'linear-gradient(135deg, #eab308, #f97316)' : ''}}
              >
                {isK ? '⚡ KEPCO 입찰시스템' : '🔗 나라장터에서 보기'}
              </a>
            </div>
          </div>
        </div>
      );
    };

    // 기관 이력 모달
    const OrgHistoryModal = ({ orgName, orgHistory, orgLoading, onClose, showToast }) => {
      if (!orgName) return null;
      
      // G2B와 KEPCO 데이터 분리
      const g2bData = orgHistory.filter(h => !h.isKepco);
      const kepcoData = orgHistory.filter(h => h.isKepco);
      
      // G2B 낙찰률 계산 (낙찰정보가 있는 것만)
      const g2bWithRate = g2bData.filter(h => parseFloat(h.sucsfbidRate) > 0);
      const avgRate = g2bWithRate.length > 0
        ? (g2bWithRate.reduce((sum, h) => sum + (parseFloat(h.sucsfbidRate) || 0), 0) / g2bWithRate.length).toFixed(2)
        : 0;
      
      const downloadCSV = () => {
        const headers = ['출처', '공고명', '공고번호', '날짜', '기초금액/추정가격', '낙찰금액', '낙찰률', '낙찰자'];
        const rows = orgHistory.map(h => {
          if (h.isKepco) {
            return [
              'KEPCO',
              h.name?.replace(/,/g, ' ') || h.bidNtceNm?.replace(/,/g, ' ') || '',
              h.no || '',
              formatKepcoDate(h.noticeDate) || '',
              h.expectPrice || '',
              '-',
              '-',
              '-'
            ];
          } else {
            const bssamt = parseFloat(h.bssamt) || parseFloat(h.plnprc) || parseFloat(h.presmptPrc) || '';
            return [
              'G2B',
              h.bidNtceNm?.replace(/,/g, ' ') || '',
              h.bidNtceNo || '',
              h.rlOpengDt?.slice(0, 10) || h.fnlSucsfDate?.slice(0, 10) || '',
              bssamt,
              h.sucsfbidAmt || '',
              h.sucsfbidRate || '',
              (h.bidwinnrNm || h.sucsfbidCorpNm || '')?.replace(/,/g, ' ')
            ];
          }
        });
        const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
        const BOM = '\uFEFF';
        const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${orgName}_낙찰이력.csv`;
        a.click();
        showToast('📥 CSV 파일 다운로드 완료!');
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{maxWidth:'800px', animation: 'slideIn 0.3s ease'}}>
            <div className="modal-header">
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div>
                  <h2 style={{fontSize:'20px', fontWeight:'bold', color:'white'}}>📊 기관 입찰 분석</h2>
                  <p style={{color:'rgba(255,255,255,0.8)', fontSize:'14px', marginTop:'4px'}}>{orgName}</p>
                </div>
                <button onClick={onClose} style={{background:'none', border:'none', color:'white', fontSize:'24px', cursor:'pointer'}}>✕</button>
              </div>
            </div>
            
            <div style={{padding:'24px'}}>
              {orgLoading ? (
                <div style={{textAlign:'center', padding:'48px 0'}}>
                  <div style={{fontSize:'32px', marginBottom:'8px'}}>⏳</div>
                  <p style={{color:'#94a3b8'}}>입찰 이력 조회 중...</p>
                </div>
              ) : orgHistory.length === 0 ? (
                <div style={{textAlign:'center', padding:'48px 0'}}>
                  <div style={{fontSize:'32px', marginBottom:'8px'}}>📭</div>
                  <p style={{color:'#94a3b8'}}>입찰 이력이 없습니다.</p>
                </div>
              ) : (
                <>
                  {/* 요약 통계 */}
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'12px', marginBottom:'24px'}}>
                    <div className="card" style={{textAlign:'center', padding:'16px'}}>
                      <div style={{color:'#94a3b8', fontSize:'12px', marginBottom:'4px'}}>총 건수</div>
                      <div style={{fontSize:'24px', fontWeight:'bold', color:'#22d3ee'}}>{orgHistory.length}건</div>
                    </div>
                    <div className="card" style={{textAlign:'center', padding:'16px'}}>
                      <div style={{color:'#94a3b8', fontSize:'12px', marginBottom:'4px'}}>나라장터</div>
                      <div style={{fontSize:'24px', fontWeight:'bold', color:'#34d399'}}>{g2bData.length}건</div>
                    </div>
                    <div className="card" style={{textAlign:'center', padding:'16px'}}>
                      <div style={{color:'#94a3b8', fontSize:'12px', marginBottom:'4px'}}>KEPCO</div>
                      <div style={{fontSize:'24px', fontWeight:'bold', color:'#facc15'}}>{kepcoData.length}건</div>
                    </div>
                  </div>
                  
                  {/* 평균 낙찰률 (G2B 데이터가 있을 때만) */}
                  {g2bWithRate.length > 0 && (
                    <div className="card" style={{padding:'16px', marginBottom:'24px', background:'linear-gradient(135deg, rgba(6,182,212,0.1), rgba(59,130,246,0.1))'}}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <span style={{color:'#94a3b8', fontSize:'14px'}}>📊 평균 낙찰률 (나라장터 {g2bWithRate.length}건 기준)</span>
                        <span style={{fontSize:'28px', fontWeight:'bold', color:'#34d399'}}>{avgRate}%</span>
                      </div>
                    </div>
                  )}
                  
                  {/* 테이블 헤더 */}
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
                    <span style={{color:'#94a3b8', fontSize:'14px'}}>📋 상세 이력 ({orgHistory.length}건)</span>
                    <button onClick={downloadCSV} className="btn btn-secondary" style={{padding:'6px 12px', fontSize:'12px'}}>
                      📥 엑셀저장
                    </button>
                  </div>
                  
                  {/* 테이블 */}
                  <div className="card" style={{padding:0, overflow:'hidden'}}>
                    <div style={{maxHeight:'350px', overflowY:'auto'}}>
                      <table style={{width:'100%', fontSize:'12px', borderCollapse:'collapse'}}>

          const end = new Date();
          const start = new Date(end.getTime() - 3 * 365 * 24 * 60 * 60 * 1000); // 3년
          
          // 30일씩 나눠서 조회

            for (let pg = 1; pg <= 5; pg++) {
              const params = new URLSearchParams({

              });
              
              try {
                const url = `${API.award}?${params}`;
                const text = await fetchApi(url);
                
                if (!text) break;
                
                let data;
                try { data = JSON.parse(text); } catch (e) { break; }
                
                if (data['nkoneps.com.response.ResponseError']) break;
                
                let items = [];
                if (data.response?.body?.items) {
                  if (Array.isArray(data.response.body.items)) {
                    items = data.response.body.items;

                if (data.data && Array.isArray(data.data)) {
                  const filtered = data.data.filter(item => {
                    if (item.name?.includes(orgName)) return true;
                    if (item.placeName?.includes(orgName)) return true;
                    const companyName = KEPCO_COMPANIES[item.company] || '';
                    if (companyName === orgName) return true;

                  });
                  
                  // KEPCO 데이터 변환
                  const kepcoItems = filtered.map(item => ({

                    isKepco: true,

                  console.log(`[KEPCO] ${orgName} 관련 ${kepcoItems.length}건 발견`);
                  allHistory = [...allHistory, ...kepcoItems];
                }
              } catch (parseErr) {
                console.log('[KEPCO] JSON 파싱 실패:', parseErr);

            }
          }
          
          // 중복 제거 및 정렬
          const unique = [...new Map(allHistory.map(item => [item.bidNtceNo || item.no, item])).values()];
          unique.sort((a, b) => {

      const loadData = async () => {
        setLoading(true);
        setKepcoError(false);
        
        // 현재 선택된 키워드 (비어있으면 전체 키워드 사용)
        let currentKeywords = keywordsRef.current;
        if (currentKeywords.size === 0) {
          currentKeywords = new Set(KEYWORDS.map(k => k.id));
          console.log('키워드 비어있음 → 전체 키워드로 검색');
        }
        console.log('=== 데이터 로딩 시작 ===');
        console.log('선택된 키워드:', [...currentKeywords]);
        
        const now = new Date();
        let all = [], g2b = 0, kep = 0;

        // G2B - 전체 데이터 가져와서 키워드 필터링
        setLoadingMsg('🏛️ 나라장터 로딩...');
        try {
          const end = new Date(now), start = new Date(now.getTime() - 30*86400000);
          let pg = 1, tp = 1, g2bAll = [];
          const MAX_PAGES = 50; // 최대 50페이지 = 5000건
          
          while (pg <= tp && pg <= MAX_PAGES) {
            setLoadingMsg(`🏛️ 나라장터 ${pg}/${Math.min(tp, MAX_PAGES)}페이지...`);
            const params = new URLSearchParams({ 
              numOfRows: '100', 
              pageNo: String(pg), 
              bidNtceBgnDt: ymd(start)+'0000', 
              bidNtceEndDt: ymd(end)+'2359'
            });

            try {
              const text = await fetchApi(url);
              if (!text) break;
              
              let d;
              try { d = JSON.parse(text); } catch { break; }
              
              if (d.response?.header?.resultCode === '00') {
                tp = Math.ceil((d.response.body.totalCount||0)/100);
                let it = d.response.body.items || [];
                if (!Array.isArray(it)) it = it.item ? (Array.isArray(it.item)?it.item:[it.item]) : [];
                console.log(`[G2B] 페이지 ${pg}/${tp}: ${it.length}건`);
                g2bAll = [...g2bAll, ...it];
                pg++;
              } else break;
            } catch(e) { 
              console.log(`[G2B] 페이지 ${pg} 에러:`, e);
              break; 
            }
          }
          
          console.log('=== G2B 전체 결과 ===');
          console.log('G2B 전체:', g2bAll.length, '건');
          
          // 키워드 필터링
          const kwValues = KEYWORDS.filter(k => currentKeywords.has(k.id)).map(k => k.value);

              if (name.includes(kw)) {
                i.matchedKeyword = kw;
                i.source = 'G2B';
                i._id = i.bidNtceNo;
                return true;
              }
            }
            return false;
          });
          
          console.log('G2B 키워드 매칭:', flt.length, '건');

            console.log('매칭 샘플:', flt[0]?.bidNtceNm, '→', flt[0]?.matchedKeyword);

          all = [...all, ...flt]; 
          g2b = flt.length;

        // KEPCO

              try {

                  noticeBeginDate: ymd(kStart), 
                  noticeEndDate: ymd(kEnd), 
                  name: kw.value
                });

                console.log(`[KEPCO] ${kw.value} 조회 ${retry > 0 ? `(재시도 ${retry})` : ''}...`);

                if (text && text.trim()) {
                  try {
                    const d = JSON.parse(text);

                    console.log(`[KEPCO] ${kw.value} 응답:`, d.data?.length || 0, '건');
                    if (d.data && Array.isArray(d.data) && d.data.length > 0) {
                      d.data.forEach(item => { 
                        item.matchedKeyword = kw.value; 
                        item.source = 'KEPCO'; 
                        item._id = `KEPCO-${item.no}`; 
                      });
                      all = [...all, ...d.data]; 
                      kep += d.data.length;
                      kepcoSuccess = true;
                    } else if (d.data && d.data.length === 0) {
                      console.log(`[KEPCO] ${kw.value} 결과 없음`);
                      kepcoSuccess = true;
                    }
                    break; // 성공하면 재시도 루프 탈출
                  } catch (parseErr) { 
                    console.log(`[KEPCO] ${kw.value} JSON 파싱 실패:`, parseErr);
                  }
                } else {
                  console.log(`[KEPCO] ${kw.value} 빈 응답`);
                }
              } catch(e) { 
                console.log(`[KEPCO] ${kw.value} 호출 실패 (${retry+1}/2):`, e.message);
                if (retry < 1) await new Promise(r => setTimeout(r, 1000)); // 재시도 전 1초 대기

            await new Promise(r => setTimeout(r, 800));

        // 정리

      const saveTg = c => { setTgConfig(c); localStorage.setItem('g2b_telegram', JSON.stringify(c)); showToast('💾 저장됨'); };

      useEffect(() => {
        if (refreshRef.current) clearInterval(refreshRef.current);
        if (tgConfig.enabled && tgConfig.refreshInterval > 0) {
          refreshRef.current = setInterval(loadData, tgConfig.refreshInterval * 60000);
        }
        return () => { if (refreshRef.current) clearInterval(refreshRef.current); };
      }, [tgConfig.enabled, tgConfig.refreshInterval]);

      useEffect(() => { loadData(); }, []);

      const filtered = items.filter(i => {
        if (bmOnly && !bookmarks.has(i._id)) return false;
        if (activeTab === 'g2b' && i.source !== 'G2B') return false;
        if (activeTab === 'kepco' && i.source !== 'KEPCO') return false;
        if (region && i.source === 'G2B' && !i.ntceInsttNm?.includes(region)) return false;
        if (i.source === 'G2B' && !bsns.has(i.bsnsDivNm)) return false;
        return true;
      });

      const toggleKw = id => setKeywords(p => { const n = new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
      const toggleAllKw = () => setKeywords(keywords.size === KEYWORDS.length ? new Set() : new Set(KEYWORDS.map(k => k.id)));
      const toggleBsns = d => setBsns(p => { const n = new Set(p); n.has(d)?n.delete(d):n.add(d); return n; });

      return (
        <div style={{minHeight:'100vh'}}>
          <header className="header">
            <div style={{maxWidth:'1280px', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
              <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                <div className="logo-box"><span style={{color:'white', fontWeight:'bold'}}>G2B</span></div>
                <div>
                  <h1 style={{color:'white', fontWeight:'bold', fontSize:'18px'}}>나라장터 + KEPCO</h1>
                  <p style={{color:'#94a3b8', fontSize:'12px'}}>안전보건 특화 v4.6 ⚡</p>
                </div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                <span className={`badge ${items.length > 0 ? 'badge-green' : 'badge-slate'}`}>
                  {loading ? '⏳ 로딩' : items.length > 0 ? '🟢 정상' : '⚪ 대기'}
                </span>
                <button className={`btn ${tgConfig.enabled ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setShowTgModal(true)}>
                  📱 알림
                </button>
                <button className="btn btn-primary" onClick={loadData} disabled={loading}>
                  {loading ? '⏳' : '🔄'} 새로고침
                </button>
              </div>
            </div>
          </header>

          <main style={{maxWidth:'1280px', margin:'0 auto', padding:'24px 16px'}}>
            {/* KEPCO 에러 안내 - 데이터가 하나도 없을 때만 표시 */}
            {kepcoError && items.filter(b => b.source === 'KEPCO').length === 0 && (
              <div className="info-box">
                <p style={{color:'#22d3ee', fontWeight:'500', marginBottom:'8px'}}>⚡ KEPCO API 연결 불가</p>
                <p style={{color:'#94a3b8', fontSize:'14px'}}>
                  KEPCO API 서버 응답 없음. 잠시 후 다시 시도해주세요.
                </p>
              </div>
            )}

            {/* 필터 */}
            <div className="filter-box">
              <div style={{marginBottom:'16px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}>
                  <span style={{color:'#94a3b8', fontSize:'14px'}}>🔍 키워드</span>
                  <button style={{background:'none', border:'none', color:'#22d3ee', fontSize:'12px', cursor:'pointer'}} onClick={toggleAllKw}>
                    {keywords.size === KEYWORDS.length ? '전체 해제' : '전체 선택'}
                  </button>
                </div>
                <div style={{display:'flex', flexWrap:'wrap'}}>
                  {KEYWORDS.map(k => (
                    <button key={k.id} className={`badge ${keywords.has(k.id) ? 'badge-cyan' : 'badge-slate'}`} 
                      style={{cursor:'pointer'}} onClick={() => toggleKw(k.id)}>{k.label}</button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex', flexWrap:'wrap', gap:'16px', alignItems:'center'}}>
                <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                  <span style={{color:'#94a3b8', fontSize:'14px'}}>📦</span>
                  {['용역','물품','공사','외자'].map(d => (
                    <button key={d} className={`badge ${bsns.has(d) ? BSNS_COLORS[d] : 'badge-slate'}`}
                      style={{cursor:'pointer'}} onClick={() => toggleBsns(d)}>{d}</button>
                  ))}
                </div>
                <select className="input" value={region} onChange={e => setRegion(e.target.value)}>
                  {REGIONS.map(r => <option key={r.code} value={r.code}>{r.name}</option>)}
                </select>
                <button className={`badge ${bmOnly ? 'badge-yellow' : 'badge-slate'}`} 
                  style={{cursor:'pointer'}} onClick={() => setBmOnly(!bmOnly)}>
                  ⭐ 북마크 ({bookmarks.size})
                </button>
              </div>
            </div>

            {/* 탭 */}
            <div style={{display:'flex', gap:'8px', marginBottom:'16px'}}>
              <button className={`btn ${activeTab === 'all' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setActiveTab('all')}>
                📋 전체 ({filtered.length})
              </button>
              <button className={`btn ${activeTab === 'g2b' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setActiveTab('g2b')}>
                🏛️ 나라장터 ({g2bCnt})
              </button>
              <button className={`btn ${activeTab === 'kepco' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setActiveTab('kepco')}
                style={activeTab === 'kepco' ? {background:'linear-gradient(135deg, #eab308, #f97316)'} : {}}>
                ⚡ KEPCO ({kepcoCnt})
              </button>
            </div>

            {/* 로딩 */}
            {loading && (
              <div style={{textAlign:'center', padding:'48px 0'}}>
                <div style={{fontSize:'32px', marginBottom:'8px'}}>⏳</div>
                <p style={{color:'#94a3b8'}}>{loadingMsg || '로딩 중...'}</p>
              </div>
            )}

            {/* 목록 */}
            {!loading && (
              <div>
                {filtered.length === 0 ? (
                  <div style={{textAlign:'center', padding:'48px 0'}}>
                    <div style={{fontSize:'32px', marginBottom:'8px'}}>📭</div>
                    <p style={{color:'#94a3b8'}}>검색 결과 없음</p>
                  </div>
                ) : filtered.map(i => {
                  const isK = i.source === 'KEPCO';
                  const name = isK ? i.name : i.bidNtceNm;
                  // KEPCO: 공고명에서 발전본부명 추출, 없으면 회사명
                  const kepcoPlace = isK ? (extractPlaceName(i.name) || KEPCO_COMPANIES[i.company] || i.placeName) : null;
                  const org = isK ? kepcoPlace : i.ntceInsttNm;
                  const amt = isK ? i.presumedPrice : i.presmptPrce;
                  const noticeD = isK ? formatKepcoDate(i.noticeDate) : i.bidNtceDate;
                  const dday = calcDday(isK ? i.endDatetime : i.bidClseDate);
                  const urgent = dday !== null && dday >= 0 && dday <= 5;
                  const bm = bookmarks.has(i._id);
                  
                  return (
                    <div key={i._id} className={`card ${urgent ? 'card-urgent' : ''} ${isK ? 'card-kepco' : ''}`} onClick={() => setSelected(i)}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}>
                        <div>
                          <span className="badge badge-cyan">{i.matchedKeyword}</span>
                          {isK ? <span className="badge badge-yellow">⚡ KEPCO</span> : (
                            <>
                              <span className={`badge ${BSNS_COLORS[i.bsnsDivNm] || 'badge-slate'}`}>{i.bsnsDivNm}</span>
                              {i.ppsNtceYn === 'N' && <span className="badge badge-purple">🔗 연계</span>}
                            </>
                          )}
                          {urgent && <span className="badge badge-red animate-pulse">🔥 D-{dday}</span>}
                        </div>
                        <button style={{background:'none', border:'none', fontSize:'20px', cursor:'pointer', color: bm ? '#facc15' : '#64748b'}} 
                          onClick={e => toggleBm(i._id, e)}>{bm ? '⭐' : '☆'}</button>
                      </div>
                      <h3 style={{color:'white', fontWeight:'600', marginBottom:'8px'}} className="line-clamp-2">{name}</h3>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
                        <div>
                          <p 
                            className={'org-link'}
                            style={{fontSize:'14px', color: isK ? '#facc15' : '#cbd5e1'}}
                            onClick={(e) => { e.stopPropagation(); loadOrgHistory(org, e, isK); }}
                          >
                            🏢 {org} <span style={{color:'#22d3ee', fontSize:'12px'}}>📊</span>
                          </p>
                          <p style={{fontSize:'12px', color:'#64748b', marginTop:'4px'}}>공고: {noticeD}</p>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <p style={{fontWeight:'bold', color:'#34d399'}}>{formatAmount(amt)}</p>
                          <p style={{fontSize:'12px', color:'#64748b'}}>추정가격</p>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {lastUpd && <div style={{textAlign:'center', color:'#64748b', fontSize:'12px', marginTop:'24px'}}>업데이트: {lastUpd.toLocaleString('ko-KR')}</div>}
          </main>

          {selected && <DetailModal item={selected} onClose={() => setSelected(null)} onOrgClick={loadOrgHistory} />}
          {selectedOrg && <OrgHistoryModal orgName={selectedOrg} orgHistory={orgHistory} orgLoading={orgLoading} onClose={() => setSelectedOrg(null)} showToast={showToast} />}
          {showTgModal && <TelegramModal config={tgConfig} onSave={saveTg} onClose={() => setShowTgModal(false)} onTest={testTg} />}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
